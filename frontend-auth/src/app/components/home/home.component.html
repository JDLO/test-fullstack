<div class="home-page">

      <img src="./../../../assets/images/logos/Logo-RD.svg" alt="Logo Realdooh" class="home-page__logo-img">
    </div>

    <h1 class="home-page__title">¡Bienvenido!</h1>

    <p class="home-page__subtitle">Has iniciado sesión correctamente</p>

    <footer class="home-page__footer">
      <img src="./../../../assets/images/logos/Econocom.svg" alt="Econocom Products & Solutions" class="home-page__footer-logo">
    </footer>

  </div>
</div>
